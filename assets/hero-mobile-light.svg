<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title description">
  <title id="title">Fishknowsss — Yu An</title>
  <desc id="description">UI/UX, interaction, product systems, and new media practice.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7f2"/>
      <stop offset="0.62" stop-color="#f3f2ed"/>
      <stop offset="1" stop-color="#eaf0ed"/>
    </linearGradient>
    <radialGradient id="signalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0a9f91" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#0a9f91" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e35d50" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#e35d50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signalLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#087f74" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#087f74" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#d45347" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif; }
      .eyebrow { font-size: 20px; font-weight: 650; letter-spacing: 3.1px; }
      .name { font-size: 66px; font-weight: 620; letter-spacing: -1.8px; }
      .tagline { font-size: 32px; font-weight: 500; letter-spacing: -0.6px; }
      .meta { font-size: 23px; font-weight: 540; letter-spacing: 0.35px; }
      .label { font-size: 20px; font-weight: 650; letter-spacing: 1.55px; }
    </style>
  </defs>

  <rect width="720" height="560" rx="30" fill="url(#background)"/>
  <circle cx="635" cy="80" r="170" fill="url(#signalGlow)" filter="url(#softBlur)"/>
  <circle cx="640" cy="505" r="145" fill="url(#coralGlow)" filter="url(#softBlur)"/>

  <g class="sans" fill="#202526">
    <text x="54" y="64" class="eyebrow" fill="#087f74">FISHKNOWSSS / DIGITAL MEDIA</text>
    <text x="52" y="154" class="name" fill="#111516">鱼谙 · Yu An</text>
    <text x="54" y="214" class="serif tagline">Designing between function</text>
    <text x="54" y="254" class="serif tagline" fill="#111516">&amp; perception.</text>
    <text x="54" y="317" class="meta" fill="#566264">UI/UX · Interaction · Product Engineering</text>
    <text x="54" y="351" class="meta" fill="#566264">New Media · Research · Delivery</text>
  </g>

  <path d="M52 414 C150 343 235 478 337 414 C439 350 520 472 668 398" fill="none" stroke="url(#signalLine)" stroke-width="3"/>
  <circle cx="337" cy="414" r="7" fill="#087f74"/>
  <circle cx="668" cy="398" r="7" fill="#d45347"/>

  <g class="sans label" fill="#3f4b4c">
    <text x="54" y="482">DESKTOP SYSTEMS</text>
    <text x="400" y="482">LOCAL-FIRST</text>
    <text x="54" y="520">AI + MEDIA</text>
    <text x="400" y="520">PRODUCT DELIVERY</text>
  </g>
</svg>
