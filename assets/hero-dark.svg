      .meta { font-size: 19px; font-weight: 540; letter-spacing: 0.55px; }
      .label { font-size: 15.5px; font-weight: 650; letter-spacing: 1.2px; }
      .field-title { font-size: 21px; font-weight: 680; letter-spacing: 0.8px; }
      .field-meta { font-size: 15.5px; font-weight: 540; letter-spacing: 0.25px; }
      .center-title { font-size: 17px; font-weight: 700; letter-spacing: 0.95px; }
      .center-meta { font-size: 13.5px; font-weight: 560; letter-spacing: 0.25px; }
