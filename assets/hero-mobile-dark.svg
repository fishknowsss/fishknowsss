<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" role="img" aria-labelledby="title description">
  <title id="title">Fishknowsss — 魚諳 / Yu An</title>
  <desc id="description">Designing between function and perception through a structured practice of interface, systems, media, and delivery.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191B22"/>
      <stop offset="0.62" stop-color="#22252E"/>
      <stop offset="1" stop-color="#29252A"/>
    </linearGradient>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif; }
      .identity { font-size: 20px; font-weight: 680; letter-spacing: 3px; }
      .display { font-size: 56px; font-weight: 500; letter-spacing: -1.2px; }
      .meta { font-size: 22px; font-weight: 550; letter-spacing: 0.3px; }
      .module-title { font-size: 26px; font-weight: 720; letter-spacing: 0.25px; }
      .module-meta { font-size: 21.5px; font-weight: 550; letter-spacing: 0.1px; }
      .core-title { font-size: 20.5px; font-weight: 720; letter-spacing: 0.35px; }
      .core-meta { font-size: 16px; font-weight: 560; letter-spacing: 0.1px; }
    </style>
  </defs>

  <rect width="720" height="760" rx="22" fill="url(#background)"/>

  <g class="sans">
    <text x="54" y="62" class="identity" fill="#8EAAFF">FISHKNOWSSS / 魚諳 · YU AN</text>
    <text x="52" y="148" class="serif display" fill="#F7F7FA">Designing between</text>
    <text x="52" y="211" class="serif display" fill="#F7F7FA">function &amp; perception.</text>
    <text x="54" y="274" class="meta" fill="#C4C8D4">UI/UX · Interaction · Product Engineering</text>
    <text x="54" y="306" class="meta" fill="#C4C8D4">New Media · Research · Delivery</text>
  </g>

  <g fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M184 484 V496 H324 V508" stroke="#8EAAFF"/>
    <path d="M536 484 V496 H396 V508" stroke="#B89AF4"/>
    <path d="M184 592 V580 H324 V568" stroke="#FF9A8F"/>
    <path d="M536 592 V580 H396 V568" stroke="#F4C66C"/>
  </g>

  <g class="sans">
    <g>
      <rect x="44" y="342" width="280" height="142" rx="12" fill="#252E45" stroke="#40527A"/>
      <rect x="62" y="358" width="44" height="4" rx="2" fill="#8EAAFF"/>
      <text x="62" y="391" class="module-title" fill="#F7F7FA">INTERFACE</text>
      <text x="62" y="421" class="module-title" fill="#F7F7FA">STRUCTURE</text>
      <text x="62" y="451" class="module-meta" fill="#B8BCC9">information · states</text>
      <text x="62" y="475" class="module-meta" fill="#B8BCC9">interaction</text>
    </g>

    <g>
      <rect x="396" y="342" width="280" height="142" rx="12" fill="#30283F" stroke="#57466F"/>
      <rect x="414" y="358" width="44" height="4" rx="2" fill="#B89AF4"/>
      <text x="414" y="391" class="module-title" fill="#F7F7FA">SYSTEM</text>
      <text x="414" y="421" class="module-title" fill="#F7F7FA">BEHAVIOR</text>
      <text x="414" y="451" class="module-meta" fill="#B8BCC9">data · feedback</text>
      <text x="414" y="475" class="module-meta" fill="#B8BCC9">reliability</text>
    </g>

    <g>
      <rect x="44" y="592" width="280" height="142" rx="12" fill="#3A292A" stroke="#69413E"/>
      <rect x="62" y="608" width="44" height="4" rx="2" fill="#FF9A8F"/>
      <text x="62" y="641" class="module-title" fill="#F7F7FA">MEDIA</text>
      <text x="62" y="671" class="module-title" fill="#F7F7FA">EXPERIENCE</text>
      <text x="62" y="701" class="module-meta" fill="#B8BCC9">image · sound</text>
      <text x="62" y="725" class="module-meta" fill="#B8BCC9">motion</text>
    </g>

    <g>
      <rect x="396" y="592" width="280" height="142" rx="12" fill="#382F20" stroke="#6A5736"/>
      <rect x="414" y="608" width="44" height="4" rx="2" fill="#F4C66C"/>
      <text x="414" y="641" class="module-title" fill="#F7F7FA">PRODUCT</text>
      <text x="414" y="671" class="module-title" fill="#F7F7FA">DELIVERY</text>
      <text x="414" y="701" class="module-meta" fill="#B8BCC9">build · package</text>
      <text x="414" y="725" class="module-meta" fill="#B8BCC9">verify</text>
