  <line x1="78" y1="350" x2="730" y2="350" stroke="#D8DDEA"/>
  <g class="sans label" fill="#464B5D">
    <text x="78" y="397">INTERACTION RESEARCH</text>
    <text x="330" y="397">PRODUCT SYSTEMS</text>
    <text x="520" y="397">AUDIOVISUAL MEDIA</text>
  </g>
  <g fill="#8B90A0">
    <circle cx="320" cy="393" r="2.7"/>
    <circle cx="510" cy="393" r="2.7"/>
  </g>
</svg>
