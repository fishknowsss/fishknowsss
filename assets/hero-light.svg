<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title description">
  <title id="title">Fishknowsss — 魚諳 / Yu An</title>
  <desc id="description">Designing between function and perception through a structured practice of interface, systems, media, and delivery.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEFEFF"/>
      <stop offset="0.62" stop-color="#F7F9FF"/>
      <stop offset="1" stop-color="#FFF8F4"/>
    </linearGradient>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif; }
      .identity { font-size: 16.5px; font-weight: 680; letter-spacing: 3px; }
      .display { font-size: 54px; font-weight: 500; letter-spacing: -1.4px; }
      .meta { font-size: 19px; font-weight: 550; letter-spacing: 0.45px; }
      .label { font-size: 14.5px; font-weight: 680; letter-spacing: 1.15px; }
      .module-title { font-size: 18px; font-weight: 720; letter-spacing: 0.55px; }
      .module-meta { font-size: 14.5px; font-weight: 550; letter-spacing: 0.2px; }
      .core-title { font-size: 16px; font-weight: 720; letter-spacing: 0.65px; }
      .core-meta { font-size: 12.5px; font-weight: 560; letter-spacing: 0.25px; }
    </style>
  </defs>

  <rect width="1200" height="460" rx="20" fill="url(#background)"/>

  <g class="sans">
    <text x="78" y="70" class="identity" fill="#3F63CE">FISHKNOWSSS / 魚諳 · YU AN</text>
    <text x="78" y="163" class="serif display" fill="#202332">Designing between</text>
    <text x="78" y="225" class="serif display" fill="#202332">function &amp; perception.</text>
    <text x="80" y="286" class="meta" fill="#5D6475">UI/UX · Interaction · Product Engineering · New Media</text>
  </g>

  <g fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M870 186 V194 H924 V201" stroke="#557BE8"/>
    <path d="M1070 186 V194 H1016 V201" stroke="#8A67D5"/>
    <path d="M870 274 V266 H924 V259" stroke="#E47C72"/>
    <path d="M1070 274 V266 H1016 V259" stroke="#E2A94F"/>
  </g>

  <g class="sans">
    <g>
      <rect x="790" y="54" width="160" height="132" rx="12" fill="#EEF3FF" stroke="#D6E0F7"/>
      <rect x="806" y="70" width="42" height="4" rx="2" fill="#557BE8"/>
      <text x="806" y="102" class="module-title" fill="#202332">INTERFACE</text>
      <text x="806" y="125" class="module-title" fill="#202332">STRUCTURE</text>
      <text x="806" y="153" class="module-meta" fill="#656B7C">information · states</text>
      <text x="806" y="174" class="module-meta" fill="#656B7C">interaction</text>
    </g>

    <g>
      <rect x="990" y="54" width="160" height="132" rx="12" fill="#F5F0FF" stroke="#E3D9F5"/>
      <rect x="1006" y="70" width="42" height="4" rx="2" fill="#8A67D5"/>
      <text x="1006" y="102" class="module-title" fill="#202332">SYSTEM</text>
      <text x="1006" y="125" class="module-title" fill="#202332">BEHAVIOR</text>
      <text x="1006" y="153" class="module-meta" fill="#656B7C">data · feedback</text>
      <text x="1006" y="174" class="module-meta" fill="#656B7C">reliability</text>
    </g>

    <g>
      <rect x="790" y="274" width="160" height="132" rx="12" fill="#FFF1EE" stroke="#F3D6D1"/>
      <rect x="806" y="290" width="42" height="4" rx="2" fill="#E47C72"/>
      <text x="806" y="322" class="module-title" fill="#202332">MEDIA</text>
      <text x="806" y="345" class="module-title" fill="#202332">EXPERIENCE</text>
      <text x="806" y="373" class="module-meta" fill="#656B7C">image · sound</text>
      <text x="806" y="394" class="module-meta" fill="#656B7C">motion</text>
    </g>

    <g>
      <rect x="990" y="274" width="160" height="132" rx="12" fill="#FFF6E3" stroke="#EEDDBF"/>
      <rect x="1006" y="290" width="42" height="4" rx="2" fill="#E2A94F"/>
      <text x="1006" y="322" class="module-title" fill="#202332">PRODUCT</text>
      <text x="1006" y="345" class="module-title" fill="#202332">DELIVERY</text>
      <text x="1006" y="373" class="module-meta" fill="#656B7C">build · package</text>
      <text x="1006" y="394" class="module-meta" fill="#656B7C">verify</text>
    </g>

    <g text-anchor="middle">
