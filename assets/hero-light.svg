<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title description">
  <title id="title">Fishknowsss — Yu An</title>
  <desc id="description">UI/UX, interaction, product systems, and new media practice.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7f2"/>
      <stop offset="0.58" stop-color="#f3f2ed"/>
      <stop offset="1" stop-color="#ecefeb"/>
    </linearGradient>
    <radialGradient id="signalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0a9f91" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0a9f91" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e35d50" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#e35d50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signalLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#087f74" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#087f74" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#d45347" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif; }
      .eyebrow { font-size: 17px; font-weight: 650; letter-spacing: 3.4px; }
      .name { font-size: 66px; font-weight: 620; letter-spacing: -2.1px; }
      .tagline { font-size: 32px; font-weight: 500; letter-spacing: -0.7px; }
      .meta { font-size: 19px; font-weight: 540; letter-spacing: 0.55px; }
      .label { font-size: 14px; font-weight: 650; letter-spacing: 1.55px; }
      .node { font-size: 13.5px; font-weight: 650; letter-spacing: 1.25px; }
    </style>
  </defs>

  <rect width="1200" height="460" rx="30" fill="url(#background)"/>
  <circle cx="1030" cy="92" r="190" fill="url(#signalGlow)" filter="url(#softBlur)"/>
  <circle cx="1135" cy="392" r="150" fill="url(#coralGlow)" filter="url(#softBlur)"/>

  <g opacity="0.38" fill="none" stroke="#0f605a">
    <circle cx="988" cy="208" r="132" stroke-width="1"/>
    <circle cx="988" cy="208" r="92" stroke-width="1" stroke-dasharray="3 10"/>
    <path d="M838 208 C888 146 931 270 988 208 C1045 146 1088 270 1140 208" stroke="url(#signalLine)" stroke-width="2.4"/>
    <path d="M858 242 C907 190 951 287 1007 235 C1060 186 1098 259 1138 232" stroke="#087f74" stroke-opacity="0.48"/>
  </g>

  <g class="sans" fill="#202526">
    <text x="78" y="72" class="eyebrow" fill="#087f74">FISHKNOWSSS / DIGITAL MEDIA · PRODUCT SYSTEMS</text>
    <text x="76" y="170" class="name" fill="#111516">鱼谙 · Yu An</text>
    <text x="78" y="226" class="serif tagline">Designing between function &amp; perception.</text>
    <text x="80" y="288" class="meta" fill="#566264">UI/UX · Interaction · Product Engineering · New Media</text>
  </g>

  <g class="sans node" text-anchor="middle">
    <circle cx="988" cy="208" r="26" fill="#edf7f4" stroke="#087f74" stroke-width="1.5"/>
    <text x="988" y="212" fill="#075f57">MAKE</text>
    <circle cx="988" cy="76" r="4" fill="#087f74"/>
    <text x="988" y="58" fill="#4f5c5e">INTERFACE</text>
    <circle cx="1120" cy="208" r="4" fill="#d45347"/>
    <text x="1120" y="191" fill="#4f5c5e">SYSTEM</text>
    <circle cx="988" cy="340" r="4" fill="#087f74"/>
    <text x="988" y="366" fill="#4f5c5e">DELIVERY</text>
    <circle cx="856" cy="208" r="4" fill="#d45347"/>
    <text x="856" y="191" fill="#4f5c5e">MEDIA</text>
  </g>

  <line x1="78" y1="354" x2="730" y2="354" stroke="#1f292a" stroke-opacity="0.16"/>
  <g class="sans label" fill="#3f4b4c">
    <text x="78" y="397">DESKTOP SYSTEMS</text>
    <text x="278" y="397">LOCAL-FIRST</text>
    <text x="441" y="397">AI + MEDIA</text>
    <text x="592" y="397">DESIGN TO DELIVERY</text>
  </g>
  <g fill="#d45347">
    <circle cx="253" cy="393" r="2.5"/>
    <circle cx="416" cy="393" r="2.5"/>
    <circle cx="567" cy="393" r="2.5"/>
  </g>
</svg>
