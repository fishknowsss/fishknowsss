      .meta { font-size: 19px; font-weight: 540; letter-spacing: 0.55px; }
      .label { font-size: 14px; font-weight: 650; letter-spacing: 1.45px; }
      .field-title { font-size: 17px; font-weight: 680; letter-spacing: 1.05px; }
      .field-meta { font-size: 13.5px; font-weight: 540; letter-spacing: 0.45px; }
      .center-title { font-size: 15px; font-weight: 700; letter-spacing: 1.15px; }
      .center-meta { font-size: 12px; font-weight: 560; letter-spacing: 0.4px; }
    </style>
